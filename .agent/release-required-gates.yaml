schema_version: "1.0"
module: schedulex
source_harness: .agent/harness.yaml
truth_state: .agent/truth-state.yaml
purpose: "定义 schedulex v1.0.0 发布必须运行的本地与 CI gate；本文件不运行 gate、不生成 evidence。"
release_version: v1.0.0

mva_assertions:
  release_manifest_generated_by: "GOWORK=off make evidence"
  release_gate_entrypoint: "GOWORK=off make release-check"
  does_not_cut_release_manifest_over: true

required_release_evidence:
  - commit
  - tree_sha
  - command
  - exit_code
  - context_env
  - manifest
  - checksum
  - artifact_url
  - workflow_run_id
  - sha256
  - gates
  - timestamp

required_ci_status_checks:
  - ci
  - release-check
  - security
  - integration
  - gates
  - worktree-check

gates:
  - id: fmt
    command: "GOWORK=off make fmt"
    required_for_release: true
  - id: vet
    command: "GOWORK=off make vet"
    required_for_release: true
  - id: lint
    command: "GOWORK=off make lint"
    required_for_release: true
  - id: test
    command: "GOWORK=off make test"
    required_for_release: true
  - id: race
    command: "GOWORK=off make race"
    required_for_release: true
  - id: build
    command: "GOWORK=off make build"
    required_for_release: true
  - id: boundary
    command: "GOWORK=off make boundary"
    required_for_release: true
  - id: contracts
    command: "GOWORK=off make contracts"
    required_for_release: true
  - id: docs_check
    command: "GOWORK=off make docs-check"
    required_for_release: true
  - id: security
    command: "GOWORK=off make security"
    required_for_release: true
  - id: api_check
    command: "GOWORK=off make api-check"
    required_for_release: true
  - id: downstream_smoke
    command: "GOWORK=off make downstream-smoke"
    required_for_release: true
  - id: integration
    command: "GOWORK=off make integration"
    required_for_release: true
  - id: schedulex_check
    command: "GOWORK=off make schedulex-check"
    required_for_release: true
  - id: governance_check
    command: "GOWORK=off make governance-check"
    required_for_release: true
  - id: p1_governance_check
    command: "GOWORK=off make p1-governance-check"
    required_for_release: true
  - id: p2_runtime_check
    command: "GOWORK=off make p2-runtime-check"
    required_for_release: true
  - id: evidence_manifest
    command: "GOWORK=off make evidence"
    required_for_release: true
  - id: release_final_check
    command: "GOWORK=off make release-final-check"
    required_for_release: true
  - id: score_check
    command: "GOWORK=off make score"
    required_for_release: true
    threshold: 9.8
  - id: release_preflight
    command: "GOWORK=off make release-preflight VERSION=v1.0.0"
    required_for_release: true
  - id: ci_extended
    command: "GOWORK=off make ci-extended VERSION=v1.0.0"
    required_for_release: true
  - id: release_check
    command: "GOWORK=off make release-check VERSION=v1.0.0"
    required_for_release: true

forbidden_upgrades:
  - "requires_fresh_run != passed"
  - "local manifest artifact != GitHub Release evidence"
  - "release-final-check != release-check"
  - "tag exists != GitHub Release published"
