schema_version: "3.1"
module: "schedulex"
default_env:
  GOWORK: "off"
required_gates:
  - id: fmt
    command: "GOWORK=off make fmt"
    purpose: "Go formatting"
  - id: vet
    command: "GOWORK=off make vet"
    purpose: "Go static analysis"
  - id: test
    command: "GOWORK=off make test"
    purpose: "unit, contract, and example smoke tests"
  - id: boundary
    command: "GOWORK=off make boundary"
    purpose: "module identity, x.go/L2+ import ban, no pkg/schedulex"
  - id: schedulex_checks
    command: "GOWORK=off make schedulex-checks"
    purpose: "deterministic scheduler L1 gate pack"
  - id: release_preflight
    command: "GOWORK=off make release-preflight VERSION=v0.1.0"
    purpose: "v0.1.0 release manifest and checksum preflight"
