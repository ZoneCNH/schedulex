name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    env:
      GOWORK: off
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # tag v7.0.0

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # tag v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Add Go bin to PATH
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install CI toolchain
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.1.6
          go install golang.org/x/vuln/cmd/govulncheck@v1.3.0

      - name: CI
        run: GOWORK=off make ci

  release-check:
    name: release-check
    runs-on: ubuntu-latest
    env:
      GOWORK: off
      VERSION: v1.0.0
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # tag v7.0.0

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # tag v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Add Go bin to PATH
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install release toolchain
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.1.6
          go install golang.org/x/vuln/cmd/govulncheck@v1.3.0

      - name: Release Check
        run: GOWORK=off make release-check VERSION="${VERSION}"
